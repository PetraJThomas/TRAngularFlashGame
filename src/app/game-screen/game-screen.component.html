<div class="loading" *ngIf="loading">
  <p>Loading questions...</p>
</div>

<div class="game" *ngIf="!showResults && !loading">
  <app-flashcard
    *ngIf="currentCard && !showingFeedback"
    [question]="currentCard.question"
    [answers]="currentCard.answers"
    [correctAnswer]="currentCard.correctAnswer"
    (transitionComplete)="handleAnswer($event)">
  </app-flashcard>

  <app-flashcard
    *ngIf="showingFeedback"
    [isFeedback]="true"
    [feedbackMessage]="feedbackMessage"
    [isCorrectFeedback]="isCorrectFeedback">
  </app-flashcard>
</div>

<div class="results" *ngIf="showResults && !leavingResults" @fadeScale (@fadeScale.done)="onResultsLeave()">
  <div class="results-header">
    <mat-icon class="celebration-icon">celebration</mat-icon>
    <h2>Let's see how you did!</h2>
    <p class="score">{{ score }} / {{ flashcards.length }}</p>
  </div>

  <div class="results-table-container">
    <table>
      <thead>
        <tr>
          <th>Question</th>
          <th>Your Answer</th>
          <th>Correct Answer</th>
          <th>Result</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let response of userResponses">
          <td>{{ response.question }}</td>
          <td [ngClass]="{ 'correct': response.isCorrect, 'incorrect': !response.isCorrect }">
            {{ response.userAnswer }}
          </td>
          <td>{{ response.correctAnswer }}</td>
          <td>
            <mat-icon *ngIf="response.isCorrect" class="correct">check_circle</mat-icon>
            <mat-icon *ngIf="!response.isCorrect" class="incorrect">cancel</mat-icon>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="results-actions">
    <button mat-raised-button color="primary" (click)="replay()">Replay</button>
    <button mat-raised-button (click)="startNewGame()">Start New Game</button>
  </div>
</div>
