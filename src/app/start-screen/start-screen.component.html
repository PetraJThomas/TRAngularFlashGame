<mat-card appearance="outlined" @fadeScaleIn *ngIf="decks.length">
  <div class="card-header">
    <h1 class="header-title">FlashcardStudio</h1>
    <p class="header-subtitle">Pick a deck to study</p>
  </div>
  <mat-card-content>
    <div class="deck-grid">
      <button class="deck-card" *ngFor="let deck of decks" (click)="selectDeck(deck.slug)">
        <span class="deck-name">{{ deck.name }}</span>
        <span class="deck-count">{{ deck.count }} questions</span>
      </button>
      <button class="deck-card deck-card--all" *ngIf="decks.length" (click)="selectAll()">
        <span class="deck-name">All Questions</span>
        <span class="deck-count">{{ totalCount }} questions</span>
      </button>
      <button class="deck-card deck-card--import" (click)="triggerImport()">
        <mat-icon>upload_file</mat-icon>
        <span class="deck-name">Import deck from file</span>
        <span class="deck-count">JSON · stored in memory</span>
      </button>
    </div>
    <input #fileInput type="file" accept="application/json,.json" hidden (change)="onFileSelected($event)" />
  </mat-card-content>
</mat-card>
